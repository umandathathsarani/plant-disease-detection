<!DOCTYPE html>
<html lang="en" data-theme="hogwarts">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Herbology & Plant Diagnosis</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="theme-controls">
    <select id="themeSelector" aria-label="Select theme">
        <option value="hogwarts">✨ Hogwarts</option>
        <option value="gryffindor">🦁 Gryffindor</option>
        <option value="slytherin">🐍 Slytherin</option>
        <option value="ravenclaw">🦅 Ravenclaw</option>
        <option value="hufflepuff">🦡 Hufflepuff</option>
    </select>
</div>

<div class="container">
    <h1>Herbology Scanner</h1>
    <p class="subtitle">Upload a leaf image to detect potential magical or muggle crop infections.</p>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">🌿</div>
        <div id="uploadText" style="font-weight: 500; color: #7f8c8d;">Click to select or drop leaf photo</div>
        <label for="fileInput" id="fileInputLabel" class="visually-hidden">Upload leaf image</label>
        <input type="file" id="fileInput" accept="image/*" aria-labelledby="fileInputLabel" title="Upload leaf image">
        <img id="preview" alt="Leaf image preview">
    </div>

    <button id="predictBtn" disabled>Run Diagnosis</button>
    <div class="spinner" id="spinner"></div>

    <div class="result-panel" id="resultPanel">
        <div class="result-title">Detected Condition:</div>
        <div class="result-value" id="diseaseOutput">None</div>
        <div class="confidence-value" id="confidenceOutput">Confidence: 0.0%</div>
    </div>
</div>

<script src="script.js" defer></script>
</body>
</html>
