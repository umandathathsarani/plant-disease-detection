<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Diagnosis System</title>
    <style>
        /* Base Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 24px;
        }

        p.subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #fafbfc;
        }

        .upload-area:hover {
            border-color: #2ecc71;
            background-color: #f2fbf5;
        }

        .upload-icon {
            font-size: 40px;
            color: #bdc3c7;
            margin-bottom: 10px;
        }

        /* Hidden Input */
        #fileInput {
            display: none;
        }

        /* Image Preview */
        #preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Button Styling */
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #27ae60;
        }

        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        /* Result Panel */
        .result-panel {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8f9fa;
            border-left: 5px solid #2ecc71;
            text-align: left;
            display: none;
        }

        .result-title {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 18px;
            color: #27ae60;
            font-weight: bold;
        }

        .confidence-value {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 5px;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            margin: 20px auto 0 auto;
            width: 30px;
            height: 30px;
            border: 4px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #2ecc71;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Plant Disease Diagnosis</h1>
    <p class="subtitle">Upload a leaf image to detect potential crop infections using deep learning.</p>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">🍃</div>
        <div id="uploadText" style="font-weight: 500; color: #7f8c8d;">Click to select or drop leaf photo</div>
        <input type="file" id="fileInput" accept="image/*">
        <img id="preview" alt="Leaf image preview">
    </div>

    <button id="predictBtn" disabled>Run Diagnosis</button>
    <div class="spinner" id="spinner"></div>

    <div class="result-panel" id="resultPanel">
        <div class="result-title">Detected Condition:</div>
        <div class="result-value" id="diseaseOutput">None</div>
        <div class="confidence-value" id="confidenceOutput">Confidence: 0.0%</div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const uploadText = document.getElementById('uploadText');
    const predictBtn = document.getElementById('predictBtn');
    const resultPanel = document.getElementById('resultPanel');
    const spinner = document.getElementById('spinner');
    const diseaseOutput = document.getElementById('diseaseOutput');
    const confidenceOutput = document.getElementById('confidenceOutput');

    // Handle file selection and display visual preview
    fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                uploadText.style.display = 'none';
                predictBtn.disabled = false;
                resultPanel.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    });

    // Send data to FastAPI endpoint
    predictBtn.addEventListener('click', async function() {
        const file = fileInput.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        // Update UI state for loading process
        predictBtn.style.display = 'none';
        spinner.style.display = 'block';
        resultPanel.style.display = 'none';

        try {
            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('API server issue encountered');

            const data = await response.json();
            
            // Render predictions inside the results view panel
            // Replacing underscores with spaces for cleaner visualization
            diseaseOutput.innerText = data.disease.replace(/___/g, ' - ').replace(/_/g, ' ');
            confidenceOutput.innerText = `Confidence Level: ${data.confidence}%`;
            resultPanel.style.display = 'block';
        } catch (error) {
            alert('Error running inference: ' + error.message);
        } finally {
            // Restore button visibility status
            spinner.style.display = 'none';
            predictBtn.style.display = 'block';
        }
    });
</script>

</body>
</html>
